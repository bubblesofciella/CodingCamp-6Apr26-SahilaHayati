<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <!-- Clock & Greeting — name editable inline by clicking greeting -->
      <div class="clock-greeting">
        <div id="clock" aria-live="polite"></div>
        <div id="date"></div>
        <!-- Greeting shown by default; click to edit name -->
        <div id="greeting-wrap">
          <span id="greeting" title="Click to set your name" tabindex="0" role="button" aria-label="Greeting — click to edit your name"></span>
          <span id="greeting-edit-hint">✎</span>
        </div>
        <!-- Name input hidden until user clicks greeting -->
        <div id="name-edit-row" hidden>
          <label for="name-input" class="sr-only">Your name</label>
          <input
            type="text"
            id="name-input"
            placeholder="Enter your name…"
            autocomplete="off"
            aria-label="Enter your name"
            maxlength="40"
          />
          <button id="btn-save-name" aria-label="Save name">
            <!-- checkmark SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>

      <!-- Theme toggle -->
      <button id="btn-theme-toggle" aria-label="Switch to dark mode" title="Toggle theme">
        <!-- moon SVG -->
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <!-- sun SVG -->
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <main>
    <!-- Pomodoro Timer -->
    <section aria-labelledby="pomodoro-heading">
      <h2 id="pomodoro-heading">Pomodoro Timer</h2>
      <div id="timer-display" aria-live="polite">25:00</div>
      <div class="timer-controls">
        <button id="btn-start" aria-label="Start timer" title="Start">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Start
        </button>
        <button id="btn-pause" aria-label="Pause timer" title="Pause">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pause
        </button>
        <button id="btn-reset" aria-label="Reset timer" title="Reset">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
          Reset
        </button>
      </div>
    </section>

    <!-- Todo List -->
    <section aria-labelledby="todo-heading">
      <h2 id="todo-heading">To-Do List</h2>

      <!-- Progress score -->
      <div id="todo-progress" aria-label="Task progress" hidden>
        <div class="progress-header">
          <span id="progress-emoji" aria-hidden="true">🌱</span>
          <span id="progress-label">0 / 0 done</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-fill"></div>
        </div>
      </div>

      <div class="todo-input-row">
        <label for="todo-input" class="sr-only">New task</label>
        <input
          type="text"
          id="todo-input"
          placeholder="Add a new task…"
          autocomplete="off"
          aria-label="New task"
        />
        <button id="btn-add-todo" aria-label="Add task" title="Add task">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <p id="todo-error" role="alert" aria-live="polite" class="error-msg"></p>
      <ul id="todo-list" aria-label="Task list"></ul>
    </section>

    <!-- Quick Links -->
    <section aria-labelledby="links-heading">
      <h2 id="links-heading">Quick Links</h2>
      <div class="links-input-row">
        <label for="link-name-input" class="sr-only">Link name</label>
        <input
          type="text"
          id="link-name-input"
          placeholder="Link name…"
          autocomplete="off"
          aria-label="Link name"
        />
        <label for="link-url-input" class="sr-only">Link URL</label>
        <input
          type="url"
          id="link-url-input"
          placeholder="https://…"
          autocomplete="off"
          aria-label="Link URL"
        />
        <button id="btn-add-link" aria-label="Add link" title="Add link">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <p id="link-error" role="alert" aria-live="polite" class="error-msg"></p>
      <div id="links-container" aria-label="Quick links"></div>
    </section>
  </main>

  <!-- Custom confirm dialog -->
  <div id="confirm-overlay" class="confirm-overlay" hidden aria-modal="true" role="dialog" aria-labelledby="confirm-msg">
    <div class="confirm-box">
      <span class="confirm-icon" aria-hidden="true">🗑️</span>
      <p id="confirm-msg" class="confirm-msg">Delete this item?</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="confirm-btn confirm-btn--cancel">Cancel</button>
        <button id="confirm-ok"     class="confirm-btn confirm-btn--ok">Delete</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/script.js"></script>
</body>
</html>
